name: Docs

# Build the mdBook (book/) and deploy it to GitHub Pages. Runs on pushes to main that touch the
# book (or this workflow) + manual dispatch. Requires Pages to be enabled once in the repo settings
# with Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least privilege for the deploy: read the repo, write Pages, mint the OIDC token deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; don't cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.5.3"

jobs:
  build:
    name: build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install the pinned mdBook release (matches the version used locally) onto PATH.
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.mdbook"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --directory="$HOME/.mdbook"
          echo "$HOME/.mdbook" >> "$GITHUB_PATH"

      - name: Build
        run: mdbook build book

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
