name: CI

# Gate every pull request (and pushes to main) on the same checks enforced locally: formatting,
# clippy with warnings-as-errors, and the full offline test suite across the feature matrix —
# both --all-features (the geo path) and --no-default-features (the geo-free path a pure-library
# consumer gets, which has genuinely divergent runtime code).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# One in-flight run per ref. A PR's merge ref (refs/pull/N/merge) is stable per PR, so a newer
# push to the PR cancels its previous run. Every push to main shares refs/heads/main, so cancel
# is gated to pull_request events only — that way each commit landing on main keeps its own CI
# result instead of a back-to-back merge cancelling the earlier commit's in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml already pins stable; installing it explicitly (with the components
      # clippy/rustfmt need) matches the release workflow and avoids an implicit toolchain
      # install on the first cargo call.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      # The suite is designed to run fully offline (local mock servers only), so it is safe and
      # deterministic in CI — no network, no flakiness. --all-features covers the geo path; since
      # `default` == all four features, this also compiles the default lib + CLI binary.
      - name: Test (all features)
        run: cargo test --all-features --locked

      # Exercise the geo-free path too. The broker has divergent no-geo runtime code (the no-op
      # attach_geo, the geo-less BrokerBuilder::build arm) that the all-features run never hits;
      # the find/check integration tests assemble it under --no-default-features. The CLI binary
      # is skipped here (required-features = ["cli"]), so no test changes are needed.
      - name: Test (no default features)
        run: cargo test --no-default-features --locked

      # The CLI binary without `server` — a supported combo (required-features = ["cli"]) that
      # neither all-features nor no-default-features compiles, so a mis-placed #[cfg] gate on a
      # server-only fn can slip through both. Build-only: this config has no bin integration tests.
      - name: Build (cli, no server)
        run: cargo build --bin proxybroker --no-default-features --features cli --locked

  # Distribution smoke (D1): the static musl binary, the FROM-scratch Docker image, and the
  # installer script. Separate job so it runs in parallel and doesn't slow the test matrix. The
  # graph is ring-only (no aws-lc-rs), so musl needs only musl-tools.
  dist:
    name: musl + docker + installer smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl

      - name: Install musl + shellcheck
        run: sudo apt-get update && sudo apt-get install -y musl-tools shellcheck

      # The static, libc-free binary the installer and Docker image ship. Prove it builds, runs
      # with zero runtime data files (all embedded), and carries the CC BY 4.0 attribution.
      - name: Build + run the static musl binary
        run: |
          cargo build --locked --target x86_64-unknown-linux-musl
          ./target/x86_64-unknown-linux-musl/debug/proxybroker --version | grep -q "IP Geolocation by DB-IP"

      # The FROM-scratch image: proves it is self-contained (no libc, no data files) offline.
      - name: Docker scratch image smoke
        run: |
          docker build -t pb-scratch .
          docker run --rm pb-scratch --version | grep -q "IP Geolocation by DB-IP"

      - name: Shellcheck the installer
        run: shellcheck install.sh

  # store-redis (Wave 9): the RedisStore round-trip can't be faithfully mocked (Lua atomicity), so
  # its integration tests run against a real Redis service container. The main test matrix stays
  # Redis-free — this is the one deliberately non-offline test path (the fold arithmetic + key
  # layout are pure-tested in the main run).
  store-redis:
    name: store-redis (redis service)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      REDIS_URL: redis://127.0.0.1:6379/
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: store-redis
      - name: Test the Redis backend
        run: cargo test --features store-redis --locked
