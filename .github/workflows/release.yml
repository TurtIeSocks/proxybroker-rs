name: Release

# Publish to crates.io when a version tag is pushed.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# The tag MUST be `v<version>` and match the version in Cargo.toml, or the job fails before
# publishing. Requires a CARGO_REGISTRY_TOKEN repository secret.
on:
  push:
    tags:
      - "v*"

# Never run two publishes for the same tag at once.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins stable; this installs it explicitly for speed.
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify the tag matches the crate version
        run: |
          VERSION="$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')"
          echo "Cargo.toml version: $VERSION"
          echo "Pushed tag:         $GITHUB_REF_NAME"
          if [ "v$VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' does not match Cargo.toml version 'v$VERSION'"
            exit 1
          fi

      # The full test suite is designed to run offline (local mock servers only), so it is
      # safe in CI and catches regressions before anything is published.
      - name: Test
        run: cargo test --all-features --locked

      # `cargo publish` re-runs this verify-build itself; running it first fails fast with a
      # clearer log if packaging is broken (e.g. a runtime file missing from `include`).
      - name: Package (verify the published tarball builds)
        run: cargo package --locked

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
