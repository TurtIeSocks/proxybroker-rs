name: Release

# On a pushed version tag: publish the crate to crates.io AND attach prebuilt CLI binaries
# to a GitHub Release.
#
#   git tag v0.1.2 && git push origin v0.1.2
#
# Or run manually (Actions → Release → Run workflow) with an existing tag to build/attach
# binaries ONLY — no crates.io publish. Useful for adding binaries to a release that shipped
# before this workflow existed.
#
# The tag MUST be `v<version>` and match the version in Cargo.toml, or nothing ships. Requires
# a CARGO_REGISTRY_TOKEN repository secret for the crates.io step.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to build binaries for (e.g. v0.1.1). Binaries only — does NOT publish to crates.io."
        required: true
        type: string

# Never run two releases for the same tag at once.
concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Gate everything on a single check: the tag is well-formed, matches the crate version, and
  # the (offline) test suite passes. Both `publish` and `binaries` depend on this, so neither
  # ships for a mistagged or broken commit. The resolved tag is exported for downstream jobs.
  verify:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve and validate the release tag
        id: resolve
        env:
          # A manual-run input, else the pushed tag. Read via env (never interpolated into the
          # shell) and validated below before it is ever used as a git ref.
          INPUT_TAG: ${{ inputs.tag }}
          REF_TAG: ${{ github.ref_name }}
        run: |
          TAG="${INPUT_TAG:-$REF_TAG}"
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "::error::invalid tag '$TAG' (expected vMAJOR.MINOR.PATCH)"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify the tag matches the crate version
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          VERSION="$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')"
          echo "Cargo.toml version: $VERSION"
          echo "Release tag:        $TAG"
          if [ "$TAG" != "v$VERSION" ]; then
            echo "::error::tag '$TAG' does not match Cargo.toml version 'v$VERSION'"
            exit 1
          fi

      # The full test suite is designed to run offline (local mock servers only), so it is
      # safe in CI and catches regressions before anything ships.
      - name: Test
        run: cargo test --all-features --locked

  publish:
    needs: verify
    # Only when a tag is pushed. Manual (workflow_dispatch) runs build binaries only and never
    # republish — crates.io versions are immutable, so a re-publish would fail anyway.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # `cargo publish` re-runs this verify-build itself; running it first fails fast with a
      # clearer log if packaging is broken (e.g. a runtime file missing from `include`).
      - name: Package (verify the published tarball builds)
        run: cargo package --locked

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  # Create the GitHub Release once, up front. A pushed git tag is NOT a Release, and none of
  # the matrix jobs reliably creates one (especially on a manual run, where the git ref is a
  # branch, not the tag) — so without this the binary jobs loop "release not found" and fail.
  # Doing it in a single job also avoids five matrix jobs racing to create the same release.
  create-release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create the GitHub Release if it does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.verify.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag
          fi

  binaries:
    needs: [verify, create-release]
    permissions:
      contents: write # upload assets to the release
    strategy:
      fail-fast: false
      # Native runner per target — no cross-compilation. The crate pulls aws-lc-rs (via
      # reqwest's rustls) and ring, both of which build cleanly with the host's native C
      # toolchain but are painful to cross-compile. macOS covers both archs on their native
      # runners (macos-13 = Intel, macos-14 = Apple Silicon); Linux uses the free arm64
      # runner for aarch64.
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # aws-lc-sys needs NASM to assemble its optimized routines on Windows/MSVC.
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Builds the `proxybroker` binary for the target, archives it (tar.gz on unix, zip on
      # Windows) WITH the licences — the binary embeds the DB-IP geo database (CC BY 4.0), so
      # its attribution (LICENSE-DATA) and NOTICE must travel with every distributed copy —
      # writes a SHA-256 checksum, and uploads everything to the tag's GitHub Release. `ref`
      # pins the target release/tag so this works identically for a pushed tag and a manual
      # run (whose git ref is a branch, not the tag).
      - name: Build and upload CLI binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: proxybroker
          target: ${{ matrix.target }}
          ref: refs/tags/${{ needs.verify.outputs.tag }}
          locked: true # build against the committed Cargo.lock, matching the published crate
          archive: proxybroker-$tag-$target
          include: LICENSE,LICENSE-DATA,NOTICE,README.md
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
